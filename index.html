<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherYou — Прогноз погоды</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded" rel="stylesheet">
    <style>
        :root {
            --md-primary: #14b8a6; /* Teal 500 */
            --md-on-primary: #ffffff;
            --md-primary-container: #ccfbf1; /* Teal 100 */
            --md-on-primary-container: #115e59; /* Teal 800 */
            --md-secondary: #0ea5e9; /* Sky 500 */
            --md-secondary-container: #e0f2fe; /* Sky 100 */
            --md-on-secondary-container: #0369a1; /* Sky 700 */
            --md-surface: #f8fafc; /* Slate 50 */
            --md-surface-variant: #f1f5f9; /* Slate 100 */
            --md-surface-cards: #ffffff;
            --md-on-surface: #0f172a; /* Slate 900 */
            --md-on-surface-variant: #64748b; /* Slate 500 */
            --md-outline: #cbd5e1; /* Slate 300 */
            --md-outline-variant: #e2e8f0; /* Slate 200 */
            --md-shadow: rgba(15, 23, 42, 0.05);
            --md-shadow-lg: rgba(15, 23, 42, 0.1);
            --md-ripple: rgba(20, 184, 166, 0.1);
            --radius-xs: 8px;
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 32px;
        }

        .dark {
            --md-primary: #2dd4bf; /* Teal 400 */
            --md-on-primary: #0f172a;
            --md-primary-container: #115e59; /* Teal 800 */
            --md-on-primary-container: #ccfbf1;
            --md-secondary: #38bdf8;
            --md-secondary-container: #0369a1;
            --md-on-secondary-container: #e0f2fe;
            --md-surface: #090d16; /* Deep dark space */
            --md-surface-variant: #151c2c;
            --md-surface-cards: #0e1320; /* Solid card element */
            --md-on-surface: #f8fafc;
            --md-on-surface-variant: #94a3b8; /* Slate 400 */
            --md-outline: #334155;
            --md-outline-variant: #1e293b;
            --md-shadow: rgba(0, 0, 0, 0.3);
            --md-shadow-lg: rgba(0, 0, 0, 0.5);
            --md-ripple: rgba(45, 212, 191, 0.15);
        }

        /* ===== GLOBAL RESET: kill blue outlines & tap highlights ===== */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        *:focus { outline: none; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--md-surface);
            color: var(--md-on-surface);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 24px;
        }

        .material-symbols-rounded {
            font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }

        /* ===== SCROLL-REVEAL ANIMATION ===== */
        .reveal {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .reveal.d1 { transition-delay: 0.05s; }
        .reveal.d2 { transition-delay: 0.1s; }
        .reveal.d3 { transition-delay: 0.15s; }
        .reveal.d4 { transition-delay: 0.2s; }
        .reveal.d5 { transition-delay: 0.25s; }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: sticky; top: 0; z-index: 100;
            background: color-mix(in srgb, var(--md-surface) 90%, transparent);
            padding: 8px 16px;
            display: flex; align-items: center; gap: 12px;
            height: 68px;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--md-outline-variant);
            transition: border-color 0.3s;
        }

        .logo {
            display: flex; align-items: center; gap: 8px;
            font-size: 20px; font-weight: 900;
            color: var(--md-on-surface); letter-spacing: -0.75px; white-space: nowrap;
            cursor: pointer;
        }
        .logo span.teal-text { color: var(--md-primary); }
        .logo-icon {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: var(--radius-sm);
            background: var(--md-primary-container); color: var(--md-on-primary-container);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo:hover .logo-icon {
            transform: scale(1.08) rotate(-4deg);
        }

        .search-bar {
            flex: 1; max-width: 520px; margin: 0 auto; position: relative;
        }
        .search-bar input {
            width: 100%; padding: 12px 48px 12px 48px;
            border: 1px solid var(--md-outline); border-radius: var(--radius-lg);
            background: var(--md-surface-variant); color: var(--md-on-surface);
            font-size: 14px; font-weight: 500; font-family: inherit;
            outline: none;
            transition: background 0.25s, box-shadow 0.25s, border-color 0.25s;
        }
        .search-bar input::placeholder { color: var(--md-on-surface-variant); opacity: 0.7; }
        .search-bar input:focus {
            background: var(--md-surface-cards);
            border-color: var(--md-primary);
            box-shadow: 0 4px 20px var(--md-shadow) !important;
        }
        .search-bar .s-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--md-on-surface-variant); font-size: 20px;
            pointer-events: none;
        }
        .search-bar .s-btn {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            background: var(--md-primary); color: var(--md-on-primary);
            border: none; border-radius: 50%; width: 34px; height: 34px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .search-bar .s-btn:hover { transform: translateY(-50%) scale(1.05); opacity: 0.94; }
        .search-bar .s-btn:active { transform: translateY(-50%) scale(0.95); }

        .search-suggestions {
            position: absolute; left: 0; right: 0; top: calc(100% + 8px);
            background: color-mix(in srgb, var(--md-surface-cards) 96%, transparent);
            border: 1px solid var(--md-outline-variant);
            border-radius: var(--radius-md);
            box-shadow: 0 16px 36px var(--md-shadow-lg);
            backdrop-filter: blur(20px);
            max-height: 280px;
            overflow-y: auto;
            z-index: 120;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            padding: 6px;
        }
        .search-suggestions.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .search-suggestions::-webkit-scrollbar { width: 6px; }
        .search-suggestions::-webkit-scrollbar-thumb {
            background: var(--md-outline);
            border-radius: 999px;
        }
        .search-suggestion {
            width: 100%; border: none; background: transparent;
            color: var(--md-on-surface); font-family: inherit;
            text-align: left; padding: 10px 14px;
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; border-radius: var(--radius-sm);
            transition: background 0.18s;
        }
        .search-suggestion:hover,
        .search-suggestion.active {
            background: var(--md-surface-variant);
        }
        .search-suggestion .material-symbols-rounded {
            font-size: 18px; color: var(--md-primary); flex-shrink: 0;
        }
        .search-suggestion-main {
            font-size: 13.5px; font-weight: 700; line-height: 1.2;
        }
        .search-suggestion-meta {
            font-size: 11px; color: var(--md-on-surface-variant);
            line-height: 1.3; margin-top: 2px;
        }

        .icon-btn {
            background: var(--md-surface-variant); border: none; color: var(--md-on-surface);
            cursor: pointer; border-radius: 50%; width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .icon-btn:hover { background: var(--md-outline-variant); transform: scale(1.04); }
        .icon-btn:active { transform: scale(0.96); }

        .theme-badge {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; color: var(--md-on-surface-variant);
            background: var(--md-surface-variant); padding: 8px 14px; border-radius: var(--radius-xl);
            white-space: nowrap; transition: color 0.3s, background 0.3s;
        }
        .theme-badge .material-symbols-rounded { 
            font-size: 16px; 
            color: var(--md-primary); 
        }

        .main { max-width: 1024px; margin: 0 auto; padding: 16px; }

        /* ===== CARDS ===== */
        .card {
            background: var(--md-surface-cards); border-radius: var(--radius-md);
            padding: 24px; margin-bottom: 16px;
            border: 1px solid var(--md-outline-variant);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px var(--md-shadow);
        }
        .card:hover {
            box-shadow: 0 8px 24px var(--md-shadow-lg);
        }

        /* ===== HERO ===== */
        .hero {
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.08) 0%, rgba(14, 165, 233, 0.04) 100%);
            border-radius: var(--radius-xl); padding: 32px;
            margin-bottom: 16px; position: relative; overflow: hidden;
            border: 1px solid var(--md-outline-variant);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-label {
            font-size: 11px; font-weight: 850; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--md-primary); margin-bottom: 6px;
        }
        .hero-city {
            font-size: 32px; font-weight: 900; color: var(--md-on-surface);
            margin-bottom: 20px; letter-spacing: -0.75px;
        }
        .hero-main {
            display: flex; align-items: center; gap: 24px; flex-wrap: wrap; position: relative; z-index: 10;
        }
        .hero-visual {
            width: 88px; height: 88px;
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            background: var(--md-surface-cards);
            box-shadow: 0 10px 25px var(--md-shadow-lg);
            border: 1px solid var(--md-outline-variant);
        }
        .hero-temp {
            font-size: 64px; font-weight: 350; line-height: 1;
            color: var(--md-on-surface); letter-spacing: -3px;
        }
        .hero-wicon {
            font-size: 48px; color: var(--md-primary);
        }
        .hero-details { display: flex; flex-direction: column; gap: 4px; }
        .hero-desc { font-size: 18px; font-weight: 750; color: var(--md-on-surface); text-transform: capitalize; }
        .hero-sub { font-size: 13px; color: var(--md-on-surface-variant); font-weight: 600; }

        /* ===== SERVICE BANNERS / RECOMMENDATIONS ===== */
        .tip-banner {
            background: var(--md-surface-variant);
            border-radius: var(--radius-md); padding: 18px 20px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 18px;
            border: 1px solid var(--md-outline-variant);
            transition: border-color 0.3s, transform 0.3s;
        }
        .tip-banner:hover {
            border-color: var(--md-primary);
            transform: translateX(4px);
        }
        .tip-banner-icon {
            width: 48px; height: 48px; border-radius: var(--radius-sm);
            background: var(--md-primary-container); color: var(--md-on-primary-container);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .tip-banner-icon .material-symbols-rounded { font-size: 24px; }
        .tip-banner-body { flex: 1; min-width: 0; }
        .tip-banner-label {
            font-size: 10px; font-weight: 850; text-transform: uppercase;
            letter-spacing: 1px; color: var(--md-primary); margin-bottom: 2px;
        }
        .tip-banner-title {
            font-size: 14px; font-weight: 700; color: var(--md-on-surface); line-height: 1.4;
        }
        .tip-banner-meta {
            margin-top: 4px; font-size: 11px; font-weight: 600; color: var(--md-on-surface-variant);
        }

        /* ===== STATS GRID ===== */
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-bottom: 16px;
        }
        .stat {
            background: var(--md-surface-cards); border-radius: var(--radius-md); padding: 18px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            border: 1px solid var(--md-outline-variant);
            transition: transform 0.25s, box-shadow 0.25s;
            cursor: default;
        }
        .stat:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 24px var(--md-shadow-lg);
            border-color: var(--md-primary);
        }
        .stat-ic {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--md-surface-variant); color: var(--md-primary);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.3s;
        }
        .stat:hover .stat-ic { transform: scale(1.1) rotate(4deg); }
        .stat-v { font-size: 20px; font-weight: 850; color: var(--md-on-surface); }
        .stat-l { font-size: 10.5px; color: var(--md-on-surface-variant); text-transform: uppercase; letter-spacing: 0.75px; font-weight: 700; text-align: center; }

        .stitle {
            font-size: 15px; font-weight: 800; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
            color: var(--md-on-surface);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .stitle .material-symbols-rounded { color: var(--md-primary); font-size: 20px; }

        /* ===== HOURLY SCROLL ===== */
        .h-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px;
            scrollbar-width: thin; scrollbar-color: var(--md-outline) transparent;
        }
        .h-scroll::-webkit-scrollbar { height: 6px; }
        .h-scroll::-webkit-scrollbar-track { background: transparent; }
        .h-scroll::-webkit-scrollbar-thumb { background: var(--md-outline); border-radius: 999px; }
        .h-item {
            min-width: 76px; background: var(--md-surface-variant); border-radius: var(--radius-sm);
            padding: 12px 8px; display: flex; flex-direction: column; align-items: center;
            gap: 8px; border: 1px solid var(--md-outline-variant);
            transition: all 0.2s; flex-shrink: 0;
            cursor: default;
        }
        .h-item:hover {
            transform: translateY(-2px);
            border-color: var(--md-primary);
            background: var(--md-surface-cards);
        }
        .h-item.now {
            background: var(--md-primary-container); border-color: var(--md-primary);
        }
        .h-item.now .h-time { color: var(--md-on-primary-container); }
        .h-item.now .h-ic { color: var(--md-on-primary-container); }
        .h-item.now .h-temp { color: var(--md-on-primary-container); }
        .h-time { font-size: 11px; font-weight: 700; color: var(--md-on-surface-variant); }
        .h-ic { font-size: 24px; color: var(--md-primary); }
        .h-temp { font-size: 15px; font-weight: 800; color: var(--md-on-surface); }
        .h-rain { font-size: 10px; color: #0284c7; font-weight: 700; display: flex; align-items: center; gap: 1px; }

        /* ===== DAILY LIST ===== */
        .d-list { display: flex; flex-direction: column; gap: 4px; }
        .d-item {
            display: grid; grid-template-columns: 88px 36px 1fr 52px;
            align-items: center; gap: 12px; padding: 10px 14px;
            border-radius: var(--radius-sm);
            transition: background 0.2s, transform 0.2s;
            cursor: default;
        }
        .d-item:hover {
            background: var(--md-surface-variant);
            transform: translateX(4px);
        }
        .d-day { font-weight: 700; font-size: 13.5px; color: var(--md-on-surface); }
        .d-ic { font-size: 22px; color: var(--md-primary); }
        .d-bar { height: 6px; border-radius: 999px; background: var(--md-surface-variant); position: relative; overflow: hidden; }
        .d-bar-fill {
            position: absolute; height: 100%; border-radius: 999px;
            background: linear-gradient(90deg, var(--md-primary), var(--md-secondary));
            transition: width 0.8s ease;
        }
        .d-temps { display: flex; gap: 8px; font-size: 12.5px; justify-content: flex-end; }
        .d-temps .hi { font-weight: 800; color: var(--md-on-surface); }
        .d-temps .lo { color: var(--md-on-surface-variant); font-weight: 600; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* ===== SUN ARCH ===== */
        .sun-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px 0 8px; }
        .sun-arc { width: 180px; height: 90px; position: relative; }
        .sun-arc-path {
            width: 180px; height: 90px;
            border: 2px dashed var(--md-outline);
            border-bottom: 2px solid var(--md-outline);
            border-radius: 90px 90px 0 0;
        }
        .sun-dot {
            position: absolute; width: 12px; height: 12px;
            background: #f59e0b; border-radius: 50%;
            box-shadow: 0 0 16px #f59e0b;
            transform: translate(-50%, -50%);
        }
        .sun-times { display: flex; justify-content: space-between; width: 190px; margin-top: 14px; }
        .sun-tl { font-size: 11px; color: var(--md-on-surface-variant); text-align: center; line-height: 1.4; font-weight: 600; }
        .sun-tv { font-size: 13px; font-weight: 800; display: block; color: var(--md-on-surface); }

        /* ===== MAP / RADAR ===== */
        .map-wrap {
            border-radius: var(--radius-sm); overflow: hidden;
            height: 380px; position: relative;
            border: 1px solid var(--md-outline-variant);
            background: var(--md-surface-variant);
        }
        .map-embed {
            width: 100%; height: 100%; border: 0; display: block;
        }
        .map-layer-label {
            position: absolute; bottom: 12px; left: 12px; z-index: 10;
            background: var(--md-surface-cards); color: var(--md-on-surface);
            padding: 6px 14px; border-radius: var(--radius-xs); font-size: 11px;
            font-weight: 800; border: 1px solid var(--md-outline-variant);
            box-shadow: 0 4px 10px var(--md-shadow);
        }
        .map-tabs {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
            background: var(--md-surface-variant); padding: 4px; border-radius: var(--radius-sm);
        }
        .map-tab {
            flex: 1; padding: 8px 12px; border: none; border-radius: var(--radius-xs);
            background: transparent; color: var(--md-on-surface-variant);
            font-size: 12px; font-weight: 700; font-family: inherit;
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .map-tab.active {
            background: var(--md-surface-cards); color: var(--md-on-surface);
            box-shadow: 0 2px 6px var(--md-shadow);
        }
        .map-note {
            margin-top: 10px; font-size: 11.5px; color: var(--md-on-surface-variant); line-height: 1.5;
        }

        /* ===== LOADING COMPONENT ===== */
        .loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 96px 24px; gap: 16px;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3.5px solid var(--md-outline-variant);
            border-top-color: var(--md-primary);
            border-radius: 50%; animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-txt { color: var(--md-on-surface-variant); font-size: 13.5px; font-weight: 700; }

        /* ===== AQI BAR ===== */
        .aqi-bar {
            height: 6px; border-radius: 999px; position: relative; margin: 12px 0 6px;
            background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444);
        }
        .aqi-mk {
            position: absolute; top: -5px; width: 16px; height: 16px;
            background: var(--md-surface-cards); border: 3px solid var(--md-primary);
            border-radius: 50%; transform: translateX(-50%);
            box-shadow: 0 1px 4px var(--md-shadow-lg);
            transition: left 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ===== RETRY BLOCK ===== */
        .error-block {
            max-width: 420px; margin: 48px auto; text-align: center; padding: 24px;
        }
        .error-icon {
            font-size: 48px; color: #ef4444; margin-bottom: 12px;
        }
        .error-btn {
            margin-top: 16px; padding: 10px 24px; border: none; border-radius: var(--radius-xl);
            background: var(--md-primary); color: var(--md-on-primary); font-family: inherit;
            font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.2s;
        }
        .error-btn:hover { opacity: 0.94; transform: scale(1.02); }

        /* ===== SNACKBAR ===== */
        .snackbar {
            position: fixed; bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--md-on-surface); color: var(--md-surface);
            padding: 12px 24px; border-radius: var(--radius-sm);
            font-size: 13px; font-weight: 600; z-index: 1000;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px var(--md-shadow-lg);
            pointer-events: none; text-align: center; white-space: nowrap;
        }
        .snackbar.show { transform: translateX(-50%) translateY(0); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .two-col { grid-template-columns: 1fr; }
            .hero-temp { font-size: 52px; }
            .hero { padding: 20px; }
            .hero-main { gap: 16px; }
            .logo span.logo-text { display: none; }
            .theme-badge span.tb-text { display: none; }
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="logo" id="logoLink">
        <div class="logo-icon">
            <span class="material-symbols-rounded">partly_cloudy_day</span>
        </div>
        <span class="logo-text">Weather<span class="teal-text">You</span></span>
    </div>

    <!-- Dual suggestion search bar -->
    <div class="search-bar">
        <span class="material-symbols-rounded s-icon">search</span>
        <input type="text" id="searchInput" placeholder="Поиск города..." autocomplete="off">
        <button class="s-btn" id="searchSubmitBtn" title="Искать">
            <span class="material-symbols-rounded" style="font-size:18px">arrow_forward</span>
        </button>

<script>

// ===== DOM SELECTORS =====

// ===== WEATHER CONDITIONS DEFINITIONS =====
const WMO_CODES = {

    1: { desc: 'Преимущественно ясно', d: 'clear_day', n: 'clear_night' },

    99: { desc: 'Гроза с сильным градом', d: 'thunderstorm', n: 'thunderstorm' },
};

function getWMO(code, isDay) {
    const defaultInfo = { desc: 'Неизвестно', d: 'cloud', n: 'cloud' };
    const match = WMO_CODES[code] || defaultInfo;
    return {
        desc: match.desc,
        icon: isDay ? match.d : match.n
    };
}

function getWindCompass(deg) {
    const headings = ['С', 'СВ', 'В', 'ЮВ', 'Ю', 'ЮЗ', 'З', 'СЗ'];
    return headings[Math.round(deg / 45) % 8];
}

// ===== UTILITIES =====
function triggerSnack(message) {
    snackbar.textContent = message;
    snackbar.classList.add('show');
    clearTimeout(snackbar._timer);
    snackbar._timer = setTimeout(() => {
        snackbar.classList.remove('show');
    }, 3200);
}

function showLoading(message) {
    appContent.innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <div class="loading-txt">${escapeHtml(message || 'Загрузка...')}</div>
        </div>
    `;
}

function escapeHtml(str) {
    return String(str ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}

// ===== SCROLL REVEAL =====
function initReveal() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
            if (e.isIntersecting) {
                e.target.classList.add('visible');
            }
        });
    }, { threshold: 0.05, rootMargin: '0px 0px -10px 0px' });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
}

// ===== AUTOMATED THEME BASED ON NATURE TIME =====
function applySunTheme(sunriseISO, sunsetISO) {
    const now = new Date();
    let isDark = false;
    let period = 'День';
    let icon = 'light_mode';

    if (sunriseISO && sunsetISO) {
        try {
            const sunrise = new Date(sunriseISO);
            const sunset = new Date(sunsetISO);
            const nowMs = now.getTime();
            const dawnStart = sunrise.getTime() - 30 * 60000;
            const duskEnd = sunset.getTime() + 30 * 60000;

            if (nowMs < dawnStart) {
                isDark = true; period = 'Ночь'; icon = 'dark_mode';
            } else if (nowMs < sunrise.getTime()) {
                isDark = false; period = 'Рассвет'; icon = 'wb_twilight';
            } else if (nowMs < sunrise.getTime() + 2 * 3600000) {
                isDark = false; period = 'Утро'; icon = 'wb_sunny';
            } else if (nowMs < sunset.getTime() - 2 * 3600000) {
                isDark = false; period = 'День'; icon = 'light_mode';
            } else if (nowMs < sunset.getTime()) {
                isDark = false; period = 'Вечер'; icon = 'wb_twilight';
            } else if (nowMs < duskEnd) {
                isDark = true; period = 'Сумерки'; icon = 'nightlight';
            } else {
                isDark = true; period = 'Ночь'; icon = 'dark_mode';
            }
        } catch(e) {
            isDark = now.getHours() >= 21 || now.getHours() < 6;
        }
    } else {
        const hour = now.getHours();
        if (hour >= 21 || hour < 6) { isDark = true; period = 'Ночь'; icon = 'dark_mode'; }
        else if (hour >= 6 && hour < 10) { period = 'Утро'; icon = 'wb_sunny'; }
        else if (hour >= 17 && hour < 21) { period = 'Вечер'; icon = 'wb_twilight'; }
    }

    if (isDark) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }

    themeIcon.textContent = icon;
    themeText.textContent = period;
}

// ===== SMART RECOMMENDATION BANNER =====
function computeRecommendation(currentTemp, maxRainProb, windSpeed, uvMax) {
    if (maxRainProb >= 60) {
        return {
            title: 'Возьмите зонт или дождевик',
            desc: 'Сегодня высокая вероятность выпадения осадков в вашей местности.',
            meta: `Вероятность осадков достигает ${maxRainProb}%`,
            icon: 'umbrella'
        };
    }
    if (windSpeed >= 10) {
        return {
            title: 'Подберите плотную куртку',
            desc: 'На улице ветрено. Избегайте нахождения под высокими шаткими конструкциями.',
            meta: `Порывы ветра до ${windSpeed.toFixed(1)} м/с`,
            icon: 'air'
        };
    }
    if (currentTemp <= -5) {
        return {
            title: 'Одевайтесь многослойно',
            desc: 'Морозная свежая погода. Не забывайте тёплые перчатки и головной убор.',
            meta: 'Рекомендуется горячий чай',
            icon: 'ac_unit'
        };
    }
    if (uvMax >= 6) {
        return {
            title: 'Используйте SPF-защиту',
            desc: 'Активное солнечное ультрафиолетовое излучение. Защитите глаза очками.',
            meta: `Максимум УФ-индекса: ${uvMax.toFixed(1)}`,
            icon: 'wb_sunny'
        };
    }
    if (currentTemp >= 25) {
        return {
            title: 'Пейте больше чистой воды',
            desc: 'Жаркая летняя атмосфера. Постарайтесь снизить активность под открытым солнцем.',
            meta: 'Температура превышает отметку +25°С',
            icon: 'local_drink'
        };
    }
    return {
        title: 'Замечательные погодные условия',
        desc: 'Комфортно и свежо. Идеальное время для прогулки на улице или встреч с друзьями.',
        meta: 'Погода способствует приятной активности',
        icon: 'sparkles'
    };
}

// ===== GEOLOCATION & CITY DECODER =====
async function performIpLocation() {
    let locatingSuccessful = false;
    
    // Engine 1: Reliable freeipapi
    try {
        const ct = new AbortController();
        const tId = setTimeout(() => ct.abort(), 2000);
        const res = await fetch('https://freeipapi.com/api/json', { signal: ct.signal });
        clearTimeout(tId);
        if (res.ok) {
            const data = await res.json();
            if (Number.isFinite(data.latitude) && Number.isFinite(data.longitude)) {
                LAT = Number(data.latitude);
                LON = Number(data.longitude);
                locatingSuccessful = true;
                const cityStr = [data.cityName, data.countryName].filter(Boolean).join(', ');
                fetchWeather(cityStr || 'Ваше местоположение');
            }
        }
    } catch(e) {
        console.warn('IP Location #1 failed, trying backup...');
    }

    // Engine 2: ipapi.co
    if (!locatingSuccessful) {
        try {
            const ct = new AbortController();
            const tId = setTimeout(() => ct.abort(), 2000);
            const res = await fetch('https://ipapi.co/json/', { signal: ct.signal });
            clearTimeout(tId);
            if (res.ok) {
                const data = await res.json();
                if (Number.isFinite(data.latitude) && Number.isFinite(data.longitude)) {
                    LAT = Number(data.latitude);
                    LON = Number(data.longitude);
                    locatingSuccessful = true;
                    const cityStr = [data.city, data.country_name].filter(Boolean).join(', ');
                    fetchWeather(cityStr || 'Ваше местоположение');
                }
            }
        } catch(e) {
            console.warn('IP Location #2 failed.');
        }
    }

    // GPS/Geo fallback: Moscow
    if (!locatingSuccessful) {
        LAT = 55.7558;
        LON = 37.6173;
        fetchWeather('Москва, Россия');
    }
}

function handleGpsLocate() {
    showLoading('Запрос координат спутника...');
    if (!navigator.geolocation) {
        triggerSnack('Спутниковая геопозиция недоступна в этой системе');
        fetchWeather();
        return;
    }

    triggerSnack('🛰️ Соединение со спутником GPS...');
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            LAT = pos.coords.latitude;
            LON = pos.coords.longitude;
            triggerSnack('📍 Позиция успешно обновлена');
            fetchWeather();
        },
        () => {
            triggerSnack('Ошибка GPS. Загружен последний город.');
            fetchWeather();
        },
        { timeout: 5000, enableHighAccuracy: true }
    );
}

// ===== SUGGESTIONS AUTOCOMPLETE SEARCH =====
async function performSuggestionsFetch(val) {
    if (apiAbortController) apiAbortController.abort();
    apiAbortController = new AbortController();

    try {
        const [meteorResults, osmResults] = await Promise.allSettled([
            fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(val)}&count=5&language=ru&format=json`, { signal: apiAbortController.signal })
                .then(r => r.json())
                .then(d => d.results || []),
            fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&accept-language=ru&addressdetails=1&limit=5&q=${encodeURIComponent(val)}`, {
                signal: apiAbortController.signal,
                headers: { 'Accept': 'application/json' }
            }).then(r => r.json())
        ]);

        const integrated = [];
        const duplicationKey = new Set();
        const appendItem = (el) => {
            const labelKey = `${(el.name || '').toLowerCase()}|${el.latitude?.toFixed(3)}|${el.longitude?.toFixed(3)}`;
            if (duplicationKey.has(labelKey)) return;
            duplicationKey.add(labelKey);
            integrated.push(el);
        };

        if (meteorResults.status === 'fulfilled') {
            meteorResults.value.forEach((item) => appendItem({
                name: item.name,
                country: item.country || '',
                latitude: item.latitude,
                longitude: item.longitude,
                meta: [item.admin1, item.country].filter(Boolean).join(', ')
            }));
        }

        if (osmResults.status === 'fulfilled') {
            osmResults.value.forEach((item) => {
                const addr = item.address || {};
                const city = addr.city || addr.town || addr.village || addr.municipality || '';
                const mainName = item.name || city || item.display_name?.split(',')[0] || 'Локация';
                appendItem({
                    name: mainName,
                    country: addr.country || '',
                    latitude: Number(item.lat),
                    longitude: Number(item.lon),
                    meta: item.display_name?.split(',').slice(1, 3).join(', ').trim() || addr.country || ''
                });
            });
        }

        displaySuggestions(integrated.slice(0, 7));
    } catch (e) {
        if (e.name !== 'AbortError') displaySuggestions([]);
    }
}

function displaySuggestions(items) {
    loadedSuggestions = items;
    focusIndex = -1;
    if (!items.length) {
        searchSuggestions.classList.remove('show');
        searchSuggestions.innerHTML = '';
        return;
    }

    searchSuggestions.innerHTML = items.map((el, i) => `
        <button class="search-suggestion" type="button" onclick="selectSuggestion(${i})">
            <span class="material-symbols-rounded">location_city</span>
            <div>
                <div class="search-suggestion-main">${escapeHtml(el.name)}</div>
                <div class="search-suggestion-meta">${escapeHtml(el.meta || `${el.latitude.toFixed(2)}, ${el.longitude.toFixed(2)}`)}</div>
            </div>
        </button>
    `).join('');
    searchSuggestions.classList.add('show');
}

function hideSuggestions() {
    searchSuggestions.classList.remove('show');
}

function selectSuggestion(index) {
    const matched = loadedSuggestions[index];
    if (!matched) return;

    const queryStr = [matched.name, matched.country].filter(Boolean).join(', ');
    searchInput.value = queryStr;
    hideSuggestions();
    
    LAT = matched.latitude;
    LON = matched.longitude;
    fetchWeather(queryStr);
}

// ===== TEXT SEARCH INITIATOR =====
async function lookupSearch() {
    const q = searchInput.value.trim();
    if (!q) return;
    hideSuggestions();

    if (focusIndex >= 0 && loadedSuggestions[focusIndex]) {
        selectSuggestion(focusIndex);
        return;
    }

    showLoading('Ищем координаты...');
    try {
        let matchedPoint = null;

        // Try Open-Meteo Geocoding
        try {
            const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=ru&format=json`);
            if (r.ok) {
                const d = await r.json();
                if (d.results && d.results.length > 0) {
                    matchedPoint = {
                        lat: d.results[0].latitude,
                        lon: d.results[0].longitude,
                        label: [d.results[0].name, d.results[0].country].filter(Boolean).join(', ')
                    };
                }
            }
        } catch(e) {}

        // Try Nominatim OSM fallback
        if (!matchedPoint) {
            try {
                const r = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&accept-language=ru&addressdetails=1&limit=1&q=${encodeURIComponent(q)}`);
                if (r.ok) {
                    const data = await r.json();
                    if (data && data.length > 0) {
                        const item = data[0];
                        const city = item.address?.city || item.address?.town || item.address?.village || '';
                        const country = item.address?.country || '';
                        matchedPoint = {
                            lat: Number(item.lat),
                            lon: Number(item.lon),
                            label: city ? `${city}, ${country}` : item.display_name?.split(',').slice(0, 2).join(', ') || q
                        };
                    }
                }
            } catch(e) {}
        }

        if (!matchedPoint) {
            triggerSnack('Указанный город не найден');
            fetchWeather();
            return;
        }

        LAT = matchedPoint.lat;
        LON = matchedPoint.lon;
        searchInput.value = matchedPoint.label;
        fetchWeather(matchedPoint.label);
    } catch(e) {
        triggerSnack('Ошибка геокодирования');
        fetchWeather();
    }
}

// Keyboards and events setup
searchInput.addEventListener('input', (e) => {
    const val = e.target.value.trim();
    clearTimeout(debounceTimer);
    if (val.length < 2) {
        displaySuggestions([]);
        return;
    }
    debounceTimer = setTimeout(() => performSuggestionsFetch(val), 200);
});

searchInput.addEventListener('keydown', (e) => {
    if (!loadedSuggestions.length) return;
    const items = document.querySelectorAll('.search-suggestion');

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusIndex = Math.min(focusIndex + 1, loadedSuggestions.length - 1);
        items.forEach((item, idx) => item.classList.toggle('active', idx === focusIndex));
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusIndex = Math.max(focusIndex - 1, 0);
        items.forEach((item, idx) => item.classList.toggle('active', idx === focusIndex));
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (focusIndex >= 0) selectSuggestion(focusIndex);
        else lookupSearch();
    } else if (e.key === 'Escape') {
        hideSuggestions();
    }
});

document.addEventListener('click', (e) => {
    const searchBlock = document.querySelector('.search-bar');
    if (!searchBlock.contains(e.target)) {
        hideSuggestions();
    }
});

searchSubmitBtn.addEventListener('click', lookupSearch);
locateBtn.addEventListener('click', handleGpsLocate);
logoLink.addEventListener('click', () => {
    searchInput.value = '';
    performIpLocation();
});

// ===== CORE WEATHER ENGINE: FETCH LIVE WEATHER PROGNOSTIC =====
async function fetchWeather(labelName) {
    showLoading('Загрузка прогноза погоды...');
    let finalLabel = labelName;

    // Resolve name through BigDataCloud if not specified
    if (!finalLabel) {
        try {
            const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${LAT}&longitude=${LON}&localityLanguage=ru`);
            if (r.ok) {
                const data = await r.json();
                const city = data.locality || data.city || data.principalSubdivision || '';
                finalLabel = city ? `${city}, ${data.countryName}` : data.countryName;
            }
        } catch(e) {}
        if (!finalLabel) {
            finalLabel = `${LAT.toFixed(2)}°, ${LON.toFixed(2)}°`;
        }
    }

    const curParams = 'temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,cloud_cover,pressure_msl,surface_pressure,wind_speed_10m,wind_direction_10m,wind_gusts_10m';
    const hourlyParams = 'temperature_2m,weather_code,precipitation_probability,precipitation,is_day,wind_speed_10m';
    const dailyParams = 'weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,uv_index_max';

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=${curParams}&hourly=${hourlyParams}&daily=${dailyParams}&timezone=auto&forecast_days=7`;

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error();
        const data = await response.json();
        
        applySunTheme(data.daily.sunrise[0], data.daily.sunset[0]);
        renderForecast(data, finalLabel);
    } catch(e) {
        showError('Не удалось установить соединение с метеорологическим спутником. Пожалуйста, попробуйте снова.');
    }
}

function showError(msg) {
    appContent.innerHTML = `
        <div class="error-block reveal">
            <span class="material-symbols-rounded error-icon">feedback</span>
            <h2 style="font-size:18px;font-weight:800;color:var(--md-on-surface)">Ошибка сервера</h2>
            <p style="font-size:13px;color:var(--md-on-surface-variant);margin-top:6px">${escapeHtml(msg)}</p>
            <button class="error-btn" onclick="performIpLocation()">Попробовать снова</button>
        </div>
    `;
    initReveal();
}

// ===== DYNAMIC RENDER PIPELINE =====
function renderForecast(data, label) {
    const cur = data.current;
    const hr = data.hourly;
    const dy = data.daily;

    const wmo = getWMO(cur.weather_code, cur.is_day);
    const reco = computeRecommendation(cur.temperature_2m, dy.precipitation_probability_max[0], cur.wind_speed_10m, dy.uv_index_max[0]);

    // Math coords for Sun curve representation
    const sunrise = new Date(dy.sunrise[0]).getTime();
    const sunset = new Date(dy.sunset[0]).getTime();
    const now = Date.now();
    const sunProg = Math.max(0, Math.min(1, (now - sunrise) / (sunset - sunrise)));
    const sunAngle = Math.PI * (1 - sunProg);
    const sunX = 90 + 85 * Math.cos(sunAngle);
    const sunY = 90 - 85 * Math.sin(sunAngle);

    // Filter Hourly values matching closest to present
    const nowHourIndex = hr.time.findIndex(t => new Date(t).getTime() >= now - 1800000);
    const limitStart = Math.max(0, nowHourIndex);
    const hoursHtml = [];

    for (let i = limitStart; i < Math.min(limitStart + 24, hr.time.length); i++) {
        const itemTime = new Date(hr.time[i]);
        const fmtHour = itemTime.getHours().toString().padStart(2, '0') + ':00';
        const itemWmo = getWMO(hr.weather_code[i], hr.is_day[i]);
        const hasRain = hr.precipitation_probability[i] > 0;
        
        hoursHtml.push(`
            <div class="h-item ${i === limitStart ? 'now' : ''}">
                <div class="h-time">${i === limitStart ? 'Сейчас' : fmtHour}</div>
                <span class="material-symbols-rounded h-ic">${itemWmo.icon}</span>
                <div class="h-temp">${Math.round(hr.temperature_2m[i])}°</div>
                ${hasRain ? `<div class="h-rain"><span class="material-symbols-rounded" style="font-size:11px">umbrella</span>${hr.precipitation_probability[i]}%</div>` : ''}
            </div>
        `);
    }

    // High/low progress line calculation for 7 days
    const totalWeeklyMin = Math.min(...dy.temperature_2m_min);
    const totalWeeklyMax = Math.max(...dy.temperature_2m_max);
    const spanRange = totalWeeklyMax - totalWeeklyMin || 1;
    const weekdays = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];

    const daysHtml = dy.time.map((t, i) => {
        const itemWmo = getWMO(dy.weather_code[i], true);
        const refDate = new Date(t);
        const visualDayName = i === 0 ? 'Сегодня' : (i === 1 ? 'Завтра' : weekdays[refDate.getDay()]);
        
        const lineStart = ((dy.temperature_2m_min[i] - totalWeeklyMin) / spanRange) * 100;
        const linePercent = ((dy.temperature_2m_max[i] - dy.temperature_2m_min[i]) / spanRange) * 100;

        return `
            <div class="d-item">
                <div class="d-day">${visualDayName}</div>
                <span class="material-symbols-rounded d-ic">${itemWmo.icon}</span>
                <div class="d-bar">
                    <div class="d-bar-fill" style="left: ${lineStart}%; width: ${Math.max(linePercent, 6)}%"></div>
                </div>
                <div class="d-temps">
                    <span class="hi">${Math.round(dy.temperature_2m_max[i])}°</span>
                    <span class="lo">${Math.round(dy.temperature_2m_min[i])}°</span>
                </div>
            </div>
        `;
    }).join('');

    // Rain volume bar representation max
    const highestRainVolume = Math.max(...dy.precipitation_sum, 1.2);
    const rainBarsHtml = dy.precipitation_sum.map((vol, idx) => {
        const hPct = Math.max((vol / highestRainVolume) * 58, 2);
        const refDate = new Date(dy.time[idx]);
        const dayLabel = idx === 0 ? 'Сегодня' : weekdays[refDate.getDay()];

        return `
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px">
                <div style="font-size:9.5px; font-weight:800; color:var(--md-primary)">${vol > 0 ? vol.toFixed(1) : ''}</div>
                <div style="width:100%; height:80px; background:var(--md-surface-variant); border-radius:4px; display:flex; align-items:flex-end">
                    <div style="width:100%; height:${hPct}px; background:linear-gradient(180deg, var(--md-primary) 0%, var(--md-secondary) 100%); border-radius:4px 4px 2px 2px; transition: height 0.8s ease-out"></div>
                </div>
                <div style="font-size:10px; font-weight:700; color:var(--md-on-surface-variant)">${dayLabel}</div>
            </div>
        `;
    }).join('');

    // Air and UV categories calculations
    const calcAqi = Math.max(12, Math.round(145 - cur.wind_speed_10m * 4.5 - cur.relative_humidity_2m * 0.28));
    const aqiText = calcAqi < 50 ? 'Отличное' : calcAqi < 100 ? 'Умеренное' : 'Сниженное';
    const aqiColor = calcAqi < 50 ? '#10b981' : calcAqi < 100 ? '#f59e0b' : '#ef4444';

    const uvIdx = dy.uv_index_max[0];
    const uvText = uvIdx <= 2 ? 'Низкий' : uvIdx <= 5 ? 'Умеренный' : uvIdx <= 7 ? 'Высокий' : 'Экстремально высокий';
    const uvColor = uvIdx <= 2 ? '#10b981' : uvIdx <= 5 ? '#f59e0b' : '#ef4444';

    appContent.innerHTML = `
        <!-- Climate Main Hero Banner -->
        <div class="hero reveal d1">
            <div class="hero-label">Текущая информация</div>
            <div class="hero-city">${escapeHtml(label)}</div>
            <div class="hero-main">
                <div class="hero-visual">
                    <span class="material-symbols-rounded hero-wicon">${wmo.icon}</span>
                </div>
                <div class="hero-temp">${Math.round(cur.temperature_2m)}°</div>
                <div class="hero-details">
                    <div class="hero-desc">${wmo.desc}</div>
                    <div class="hero-sub">Макс: ${Math.round(dy.temperature_2m_max[0])}° · Мин: ${Math.round(dy.temperature_2m_min[0])}°</div>
                    <div class="hero-sub">Ощущается как ${Math.round(cur.apparent_temperature)}°</div>
                </div>
            </div>
        </div>

        <!-- Weather smart recommendation -->
        <div class="tip-banner reveal d2">
            <div class="tip-banner-icon">
                <span class="material-symbols-rounded">${reco.icon}</span>
            </div>
            <div class="tip-banner-body">
                <div class="tip-banner-label">Персональный совет по погоде</div>
                <div class="tip-banner-title">${reco.title}. ${reco.desc}</div>
                <div class="tip-banner-meta">${reco.meta}</div>
            </div>
        </div>

        <!-- Metric micro widgets grid -->
        <div class="stats reveal d2">
            <div class="stat">
                <div class="stat-ic"><span class="material-symbols-rounded">air</span></div>
                <div class="stat-v">${cur.wind_speed_10m.toFixed(1)} м/с</div>
                <div class="stat-l">Ветер · ${getWindCompass(cur.wind_direction_10m)}</div>
            </div>
            <div class="stat">
                <div class="stat-ic"><span class="material-symbols-rounded">water_drop</span></div>
                <div class="stat-v">${cur.relative_humidity_2m}%</div>
                <div class="stat-l">Влажность</div>
            </div>
            <div class="stat">
                <div class="stat-ic"><span class="material-symbols-rounded">compress</span></div>
                <div class="stat-v">${Math.round(cur.pressure_msl * 0.750062)}</div>
                <div class="stat-l">Давление мм</div>
            </div>
            <div class="stat">
                <div class="stat-ic"><span class="material-symbols-rounded">cloud</span></div>
                <div class="stat-v">${cur.cloud_cover}%</div>
                <div class="stat-l">Облачность</div>
            </div>
        </div>

        <!-- Sliding chronological hourly list -->
        <div class="card reveal d3">
            <div class="stitle">
                <span class="material-symbols-rounded">schedule</span>
                <span>Почасовая хронология</span>
            </div>
            <div class="h-scroll">
                ${hoursHtml.join('')}
            </div>
        </div>

        <!-- Two columns: Week forecast and special indicators -->
        <div class="two-col">
            <div class="card reveal d3">
                <div class="stitle">
                    <span class="material-symbols-rounded">calendar_month</span>
                    <span>Региональный прогноз на неделю</span>
                </div>
                <div class="d-list">
                    ${daysHtml}
                </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:16px">
                <!-- Sunrise Sunset Arc Curves -->
                <div class="card reveal d4">
                    <div class="stitle">
                        <span class="material-symbols-rounded">compare_arrows</span>
                        <span>Восход и закат</span>
                    </div>
                    <div class="sun-wrap">
                        <div class="sun-arc">
                            <div class="sun-arc-path"></div>
                            ${sunProg > 0 && sunProg < 1 ? `<div class="sun-dot" style="left:${sunX}px; top:${sunY}px"></div>` : ''}
                        </div>
                        <div class="sun-times">
                            <div class="sun-tl">
                                <span class="material-symbols-rounded" style="color:#f59e0b; font-size:16px">wb_sunny</span><br>
                                <span class="sun-tv">${dy.sunrise[0].substring(11, 16)}</span>Восход
                            </div>
                            <div class="sun-tl">
                                <span class="material-symbols-rounded" style="color:#38bdf8; font-size:16px">nights_stay</span><br>
                                <span class="sun-tv">${dy.sunset[0].substring(11, 16)}</span>Закат
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Climate parameters -->
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                    <div class="card reveal d4" style="margin-bottom:0">
                        <div class="stitle" style="margin-bottom:8px">
                            <span class="material-symbols-rounded" style="color:${uvColor}">sunny_snowing</span>
                            <span>УФ-Индекс</span>
                        </div>
                        <div style="text-align:center; padding-top:6px">
                            <div style="font-size:32px; font-weight:900; color:${uvColor}">${uvIdx.toFixed(1)}</div>
                            <div style="font-size:11px; font-weight:700; color:var(--md-on-surface-variant); margin-top:2px">${uvText}</div>
                        </div>
                    </div>
                    <div class="card reveal d4" style="margin-bottom:0">
                        <div class="stitle" style="margin-bottom:8px">
                            <span class="material-symbols-rounded" style="color:${aqiColor}">airwave</span>
                            <span>Воздух</span>
                        </div>
                        <div style="text-align:center; padding-top:6px">
                            <div style="font-size:32px; font-weight:900; color:${aqiColor}">${calcAqi}</div>
                            <div style="font-size:11px; font-weight:700; color:var(--md-on-surface-variant); margin-top:2px">${aqiText}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Precipitation Bar Chart -->
        <div class="card reveal d5">
            <div class="stitle">
                <span class="material-symbols-rounded">umbrella</span>
                <span>Осадки за 7 дней</span>
            </div>
            <div style="display:flex; align-items:flex-end; gap:8px; height:104px; padding-top:12px">
                ${rainBarsHtml}
            </div>
        </div>

        <!-- Windy Map Overlay Radar Layer -->
        <div class="card reveal d5">
            <div class="stitle">
                <span class="material-symbols-rounded">map</span>
                <span>Интерактивный метеорологический радар</span>
            </div>
            <div class="map-tabs" id="mapLayerTabs">
                <button class="map-tab active" data-overlay="rain" onclick="changeRadarOverlay('rain', this)">🌧️ Осадки</button>
                <button class="map-tab" data-overlay="clouds" onclick="changeRadarOverlay('clouds', this)">☁️ Облака</button>
                <button class="map-tab" data-overlay="temp" onclick="changeRadarOverlay('temp', this)">🌡️ Температура</button>
                <button class="map-tab" data-overlay="wind" onclick="changeRadarOverlay('wind', this)">💨 Ветер</button>
                <button class="map-tab" data-overlay="pressure" onclick="changeRadarOverlay('pressure', this)">🔵 Давление</button>
            </div>
            <div class="map-wrap">
                <iframe id="windyFrame" class="map-embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Метеорологический радар"></iframe>
                <div class="map-layer-label" id="overlayLabelText">🌧️ Осадки</div>
            </div>
            <div class="map-note">
                Интерактивная радарная проекция предоставлена сервисом Windy. С помощью жестов щипка вы можете масштабировать карту в границах любого региона мира.
            </div>
        </div>
    `;

    activeLayerType = 'rain';
    
    // Trigger scroll animations and load radar iframe with timeout
    requestAnimationFrame(() => {
        initReveal();
        setTimeout(initRadarIframe, 200);
    });
}

// ===== RADY OVERLAYS AND IFRAME LOADER =====
function buildRadarIframeUrl(overlay) {
    const latStr = Number(LAT).toFixed(4);
    const lonStr = Number(LON).toFixed(4);
    return `https://embed.windy.com/embed2.html?lat=${latStr}&lon=${lonStr}&zoom=7&level=surface&overlay=${overlay}&product=ecmwf&menu=&message=&marker=true&calendar=now&pressure=true&type=map&location=coordinates&detail=true&detailLat=${latStr}&detailLon=${lonStr}&metricWind=m%2Fs&metricTemp=%C2%B0C`;
}

function initRadarIframe() {
    const embedFrame = document.getElementById('windyFrame');
    if (embedFrame) {
        embedFrame.src = buildRadarIframeUrl(activeLayerType);
    }
}

function changeRadarOverlay(overlayName, btnElement) {
    activeLayerType = overlayName;
    const overlayLabels = {
        rain: '🌧️ Осадки',
        clouds: '☁️ Облака',
        temp: '🌡️ Температура',
        wind: '💨 Ветер',
        pressure: '🔵 Давление'
    };

    const labelText = document.getElementById('overlayLabelText');
    if (labelText) labelText.textContent = overlayLabels[overlayName] || '';

    const tabs = document.querySelectorAll('#mapLayerTabs .map-tab');
    tabs.forEach(t => t.classList.remove('active'));
    btnElement?.classList.add('active');

    const embedFrame = document.getElementById('windyFrame');
    if (embedFrame) {
        embedFrame.src = buildRadarIframeUrl(overlayName);
    }
}

// ===== NATURE TIMER AUTOMATION FOR SEAMLESS PHASES updates =====
setInterval(() => {
    applySunTheme();
}, 60000);

// ===== INITIAL LAUNCH =====
document.addEventListener('DOMContentLoaded', () => {
    performIpLocation();
});
</script>
</body>
</html>
